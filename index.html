<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0d1a"/>
<title>KRC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&family=Varela+Round&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0b0d1a; --bg2:#0e1124;
    --violet:#8b7cff; --blue:#5b9dff; --cyan:#4fe0d8; --warm:#ffb15c; --pink:#ff7eb6;
    --grad:linear-gradient(135deg,#8b7cff,#5b9dff);
    --grad-warm:linear-gradient(135deg,#ffb15c,#ff7eb6);
    --glass:rgba(255,255,255,.055); --glass2:rgba(255,255,255,.08);
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
    --txt:#f2f5fb; --dim:#9aa8bf; --faint:#6b7892;
    --good:#54d6a0; --danger:#ff6b7d; --warn:#ffc266;
    --r:20px; --r2:16px; --sh:0 12px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Nunito Sans',-apple-system,"Segoe UI",system-ui,Roboto,sans-serif;
    color:var(--txt);overscroll-behavior:none;font-size:15px;line-height:1.5;
    background:
      radial-gradient(120% 75% at 50% -8%, #1a1840 0%, transparent 55%),
      radial-gradient(90% 60% at 92% 8%, rgba(79,224,216,.10) 0%, transparent 45%),
      radial-gradient(90% 60% at 6% 18%, rgba(255,126,182,.08) 0%, transparent 42%),
      var(--bg);
    background-attachment:fixed;
  }
  h1,h2,h3,.brandfont{font-family:'Varela Round',var(--bg);letter-spacing:.01em}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
  .grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  @keyframes reduce{from{}to{}}
  @media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

  /* ============ ONBOARDING ============ */
  #onb{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 24px;text-align:center;overflow-y:auto}
  #onb.hide{display:none}
  .onb-card{width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center;animation:rise .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .dots{display:flex;gap:8px;margin-bottom:30px}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);transition:.35s}
  .dots i.on{width:26px;border-radius:5px;background:var(--grad)}
  .onb-title{font-size:27px;font-weight:700;margin:22px 0 8px}
  .onb-sub{color:var(--dim);font-size:15px;max-width:340px;margin:0 auto 4px;line-height:1.6}
  .onb-body{width:100%;margin:22px 0 8px;text-align:left}
  .big-btn{background:var(--grad);color:#0a0c18;font-weight:800;font-size:16px;border-radius:16px;padding:16px;width:100%;
    margin-top:24px;box-shadow:0 10px 30px rgba(123,108,255,.35);transition:transform .2s,box-shadow .2s}
  .big-btn:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(123,108,255,.45)}
  .big-btn.ghost{background:var(--glass);color:var(--txt);border:1px solid var(--line2);box-shadow:none;margin-top:12px}
  .big-btn.ghost:hover{background:var(--glass2);transform:none}
  .skip{color:var(--faint);font-size:13px;margin-top:16px;text-decoration:underline;text-underline-offset:3px}

  /* hero orb / face */
  .orb{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center}
  .orb .halo{position:absolute;inset:-8px;border-radius:50%;background:var(--grad);filter:blur(26px);opacity:.55;animation:breathe 4.2s ease-in-out infinite}
  .orb .ball{position:absolute;inset:0;border-radius:50%;background:
      radial-gradient(circle at 36% 30%, #b9adff 0%, #6f7dff 38%, #3f63d8 72%, #2a2f6b 100%);
    box-shadow:inset 0 -10px 26px rgba(0,0,0,.35), inset 0 8px 20px rgba(255,255,255,.25);animation:breathe 4.2s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
  .orb .eyes{position:relative;z-index:2;display:flex;gap:22px}
  .orb .eye{width:17px;height:34px;border-radius:10px;background:#0a1020;box-shadow:0 0 10px rgba(120,180,255,.6);animation:blink 5s infinite}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
  .orb.small{width:74px;height:74px}.orb.small .eye{width:9px;height:18px;gap:0}.orb.small .eyes{gap:12px}

  .feat{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .feat:last-child{border-bottom:0}
  .feat .fi{width:38px;height:38px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--glass);color:var(--cyan)}
  .feat b{font-weight:700;font-size:14.5px}.feat p{color:var(--dim);font-size:13px;margin-top:2px}

  .field{margin:14px 0}
  .field label{display:block;color:var(--dim);font-size:12.5px;margin-bottom:7px;font-weight:600;letter-spacing:.02em}
  .inp{width:100%;background:var(--glass);border:1px solid var(--line);color:var(--txt);border-radius:14px;padding:14px 16px;font-size:16px;outline:none;transition:.2s}
  .inp:focus{border-color:var(--violet);background:var(--glass2);box-shadow:0 0 0 4px rgba(139,124,255,.14)}
  textarea.inp{resize:vertical;min-height:48px}
  .hint{color:var(--faint);font-size:12.5px;margin-top:8px;line-height:1.5}
  .seg-note{background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:13.5px;color:var(--dim);line-height:1.6;margin-top:6px}
  .seg-note b{color:var(--txt)}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
  .toggle-row:last-child{border:0}
  .toggle-row .tt b{font-size:14.5px}.toggle-row .tt p{color:var(--dim);font-size:12.5px}
  .sw{width:48px;height:28px;border-radius:16px;background:rgba(255,255,255,.16);position:relative;flex:0 0 auto;transition:.25s;cursor:pointer}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.25s}
  .sw.on{background:var(--grad)}.sw.on::after{transform:translateX(20px)}

  /* ============ APP ============ */
  #app{display:none;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative}
  #app.show{display:flex}
  header{display:flex;align-items:center;gap:11px;padding:16px 18px 8px}
  header .logo{font-weight:700;letter-spacing:.18em;font-size:22px}
  header .sub{color:var(--faint);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
  .status-dot{width:9px;height:9px;border-radius:50%;background:#c0392b;margin-left:auto;box-shadow:0 0 10px #c0392b;transition:.3s}
  .status-dot.on{background:var(--good);box-shadow:0 0 12px var(--good)}
  main{flex:1;overflow-y:auto;padding:6px 16px 110px}
  .chatview main{padding-bottom:176px}

  h1{font-size:26px;font-weight:700;margin:6px 2px 2px}
  h2.sec{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:24px 4px 12px;font-weight:800}
  .card{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
  .hero{display:flex;align-items:center;gap:16px;background:var(--glass);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:var(--grad);filter:blur(40px);opacity:.18}
  .hero .htxt{flex:1;min-width:0;z-index:1}
  .hero .htxt b{font-size:17px;font-weight:700;display:block}
  .hero .htxt p{color:var(--dim);font-size:13.5px;margin-top:3px}

  .quick{display:flex;gap:9px;margin:16px 0 4px}
  .quick .inp{flex:1}
  .add{background:var(--grad);color:#0a0c18;border-radius:14px;width:50px;font-size:26px;line-height:1;flex:0 0 auto;font-weight:600;transition:transform .15s}
  .add:active{transform:scale(.92)}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{background:var(--glass);border:1px solid var(--line);color:var(--txt);border-radius:14px;padding:11px 14px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.2s}
  .chip:hover{background:var(--glass2);border-color:var(--line2);transform:translateY(-1px)}
  .chip .ci{color:var(--cyan);display:flex}

  .focus-card{text-align:center}
  .focus-time{font-size:52px;font-weight:700;letter-spacing:.01em;font-family:'Varela Round'}
  .focus-lbl{color:var(--dim);font-size:13px;margin-top:2px}
  .focus-btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
  .pill-btn{background:var(--glass);border:1px solid var(--line);color:var(--txt);border-radius:13px;padding:10px 18px;font-size:14px;font-weight:700;transition:.2s}
  .pill-btn:hover{background:var(--glass2)}
  .pill-btn.primary{background:var(--grad);color:#0a0c18;border-color:transparent}
  .pill-btn.rec{background:var(--danger);color:#fff;border-color:transparent;animation:recpulse 1.3s ease-in-out infinite}
  @keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,125,.5)}50%{box-shadow:0 0 0 9px rgba(255,107,125,0)}}

  .agenda-h{margin:6px 0 6px;color:var(--faint);font-size:11px;letter-spacing:.1em;font-weight:800}
  .agenda-row{display:flex;gap:10px;padding:7px 0;align-items:baseline}
  .agenda-row .tm{color:var(--cyan);font-size:13px;min-width:64px;font-weight:700}

  /* segmented */
  .seg{display:flex;background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:4px;margin:4px 0 16px}
  .seg button{flex:1;padding:9px 4px;font-size:13px;font-weight:700;color:var(--dim);border-radius:11px;transition:.2s}
  .seg button.on{background:var(--grad);color:#0a0c18}

  /* list rows */
  .lwrap{display:flex;flex-direction:column;gap:10px}
  .swipe{position:relative;border-radius:var(--r2);overflow:hidden}
  .swipe .del{position:absolute;top:0;right:0;height:100%;width:84px;background:var(--danger);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .row{display:flex;align-items:center;gap:13px;padding:15px;background:var(--glass);border:1px solid var(--line);border-radius:var(--r2);position:relative;transition:transform .18s ease;touch-action:pan-y;will-change:transform}
  .cb{width:25px;height:25px;border-radius:50%;border:2px solid var(--faint);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#0a0c18;font-size:14px;transition:.15s}
  .cb.on{border-color:transparent;background:var(--grad)}
  .row .t{flex:1;min-width:0;word-wrap:break-word}
  .row .subt{display:block;color:var(--cyan);font-size:12px;margin-top:3px;font-weight:600}
  .row.done .t{color:var(--faint);text-decoration:line-through}
  .empty{color:var(--faint);text-align:center;padding:48px 0;font-size:14px}
  .empty .eorb{margin:0 auto 14px}

  /* chat */
  .face-wrap{display:flex;justify-content:center;padding:8px 0 4px}
  #face{display:block;width:100%;max-width:300px;border-radius:20px}
  .msg{max-width:84%;padding:12px 16px;border-radius:20px;margin:9px 0;white-space:pre-wrap;word-wrap:break-word;line-height:1.5;animation:pop .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
  .msg.you{background:var(--grad);color:#0a0c18;margin-left:auto;border-bottom-right-radius:6px;font-weight:600}
  .msg.krc{background:var(--glass);border:1px solid var(--line);border-bottom-left-radius:6px}
  .msg.sys{background:none;color:var(--faint);font-size:12.5px;text-align:center;max-width:100%}
  .composer{display:flex;gap:9px;align-items:center;padding:7px 8px 7px 16px;position:fixed;bottom:92px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:536px;z-index:39;
    background:rgba(14,17,36,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:30px;box-shadow:var(--sh)}
  .composer input{flex:1;background:transparent;border:0;color:var(--txt);padding:10px 4px;font-size:16px;outline:none}
  .composer .cbtn{background:var(--grad);color:#0a0c18;border-radius:50%;width:44px;height:44px;font-size:18px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .composer .mic{background:var(--glass2);color:var(--cyan)}
  .composer .mic.on{box-shadow:0 0 16px var(--cyan)}
  .typing{display:inline-flex;gap:4px;align-items:center;padding:2px 2px}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--cyan);opacity:.4;animation:tblink 1s infinite}
  .typing i:nth-child(2){animation-delay:.2s}
  .typing i:nth-child(3){animation-delay:.4s}
  @keyframes tblink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .msg.krc pre.code{background:#0b1120;border:1px solid var(--glass2);border-radius:10px;padding:10px 12px;margin:7px 0;overflow-x:auto;white-space:pre;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.45}
  .msg.krc code{background:var(--glass2);padding:1px 5px;border-radius:5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.92em}
  .msg.krc a{color:var(--cyan);word-break:break-word}
  .copybtn{display:inline-block;margin-top:9px;background:var(--glass2);color:var(--faint);border:0;border-radius:8px;padding:4px 11px;font-size:12px;cursor:pointer}
  .copybtn:active{transform:scale(.96)}

  /* settings */
  .set-group{background:var(--glass);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
  .set-item{display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid var(--line)}
  .set-item:last-child{border:0}
  .set-item .si{width:34px;height:34px;border-radius:10px;background:var(--glass);display:flex;align-items:center;justify-content:center;color:var(--cyan);flex:0 0 auto}
  .set-item .sg{flex:1;min-width:0}.set-item .sg b{font-size:14.5px;font-weight:700}.set-item .sg p{color:var(--dim);font-size:12.5px}
  .btn{background:var(--grad);color:#0a0c18;border-radius:14px;padding:15px;width:100%;font-size:15px;font-weight:800;transition:transform .2s}
  .btn:hover{transform:translateY(-1px)}
  .btn.ghost{background:var(--glass);border:1px solid var(--line2);color:var(--txt)}
  .status{margin-top:12px;color:var(--dim);font-size:13px;white-space:pre-wrap;line-height:1.5}

  /* bottom nav */
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:calc(100% - 24px);max-width:536px;display:flex;justify-content:space-around;gap:3px;padding:9px 8px;z-index:40;
    background:rgba(14,17,36,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:26px;box-shadow:var(--sh)}
  nav button{flex:1;color:var(--faint);padding:7px 2px;font-size:10.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:16px;transition:.22s}
  nav button svg{width:21px;height:21px}
  nav button.on{color:var(--txt)}
  nav button.on .nb{background:var(--grad);color:#0a0c18}
  nav .nb{width:46px;height:30px;border-radius:13px;display:flex;align-items:center;justify-content:center;transition:.22s}

  .hide{display:none !important}
</style>
</head>
<body>

<!-- ================= ONBOARDING ================= -->
<div id="onb">
  <div class="onb-card" id="onbCard"></div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <header>
    <span class="logo grad-txt brandfont">KRC</span>
    <span class="sub" id="hsub">companion</span>
    <span class="status-dot" id="dot"></span>
  </header>
  <main id="main"></main>

  <div class="composer hide" id="composer">
    <button class="cbtn mic" id="micBtn" title="Talk">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
    </button>
    <input id="chatInput" placeholder="Talk to KRC…" autocomplete="off"/>
    <button class="cbtn" id="sendBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></button>
  </div>

  <nav id="nav">
    <button data-v="home" class="on"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 9-8 9 8M5 10v10h14V10"/></svg></span>Home</button>
    <button data-v="chat"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg></span>Chat</button>
    <button data-v="meet"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M8 21h8"/></svg></span>Meet</button>
    <button data-v="lists"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></span>Lists</button>
    <button data-v="brain"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5a3 3 0 0 0-3 3 3 3 0 0 0-2 5 3 3 0 0 0 2 5 3 3 0 0 0 6 0 3 3 0 0 0 2-5 3 3 0 0 0-2-5 3 3 0 0 0-3-3z"/></svg></span>Brain</button>
    <button data-v="profile"><span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg></span>You</button>
  </nav>
</div>

<script>
/* ===================== config ===================== */
const $=s=>document.querySelector(s);
const cfg={
  get url(){return (localStorage.krcUrl||'https://krc-cloud.onrender.com').replace(/\/+$/,'');},
  set url(v){localStorage.krcUrl=v;},
  get token(){return localStorage.krcToken||'';},
  set token(v){localStorage.krcToken=v;},
  get name(){return localStorage.krcName||'';},
  set name(v){localStorage.krcName=v;},
  get speak(){return localStorage.krcSpeak!=='0';},
  set speak(v){localStorage.krcSpeak=v?'1':'0';},
  get eleven(){return localStorage.krcEleven==='1';},
  set eleven(v){localStorage.krcEleven=v?'1':'0';},
  get onboarded(){return localStorage.krcOnboarded==='1';},
  set onboarded(v){localStorage.krcOnboarded=v?'1':'0';},
};
// One-scan setup from the box QR: ?token=XXX&url=YYY  (re-applied every launch — iOS PWA isolation)
(function(){try{const q=new URLSearchParams(location.search);
  if(q.get('token'))cfg.token=q.get('token');
  if(q.get('url'))cfg.url=q.get('url');
}catch(e){}})();

async function api(path,opts={}){
  const headers=Object.assign({'X-KRC-Token':cfg.token},opts.headers||{});
  if(opts.body)headers['Content-Type']='application/json';
  // Hard timeout so the UI can NEVER hang forever (Render cold start ~30s, or a dead network).
  // POSTs (LLM/PC actions/cold start) get a longer leash than GETs.
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),opts.timeoutMs||(opts.body?45000:20000));
  let r;
  try{r=await fetch(cfg.url+path,Object.assign({},opts,{headers,signal:ctrl.signal}));}
  catch(e){clearTimeout(t);throw new Error(e&&e.name==='AbortError'
    ?'KRC took too long — it may be waking up. Give it a moment and try again.'
    :'Can’t reach KRC — check your connection or Setup.');}
  clearTimeout(t);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setDot(on){const d=$('#dot');if(d)d.classList.toggle('on',!!on);}
function kspeak(t){if(cfg.speak&&t)speak(t);}

let view='home',voiceOn=false,listKind='tasks';
const chat=[];

function show(v){
  if(view==='see'&&v!=='see'){try{seeStopCam();}catch(e){}}
  if(view==='gest'&&v!=='gest'){try{gestStop();}catch(e){}}
  view=v;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#app').classList.toggle('chatview',v==='chat');
  $('#composer').classList.toggle('hide',v!=='chat');
  if(v==='home')renderHome();
  else if(v==='chat')renderChat();
  else if(v==='meet')renderMeet();
  else if(v==='pc')renderPC();
  else if(v==='see')renderSee();
  else if(v==='gest')renderGest();
  else if(v==='lists')renderLists();
  else if(v==='brain')renderBrain();
  else if(v==='profile')renderProfile();
}

/* ---------- Pomodoro ---------- */
const POMO={t:25*60,run:false,mode:'focus',iv:null};
function pomoFmt(s){const m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}
function pomoPaint(){const a=$('#pomoTime');if(a)a.textContent=pomoFmt(POMO.t);const l=$('#pomoLbl');if(l)l.textContent=(POMO.mode==='focus'?'Pomodoro · focus session':'Break · relax');const b=$('#pomoStart');if(b)b.textContent=POMO.run?'⏸ Pause':'▶ Start';}
function pomoDone(){POMO.run=false;if(POMO.iv){clearInterval(POMO.iv);POMO.iv=null;}const wf=POMO.mode==='focus';POMO.mode=wf?'break':'focus';POMO.t=(wf?5:25)*60;try{if(navigator.vibrate)navigator.vibrate([200,100,200]);}catch(e){}const msg=wf?'Focus session done — take a 5 minute break.':'Break over — ready to focus again?';kspeak(msg);try{if(window.Notification&&Notification.permission==='granted')new Notification('KRC',{body:msg});}catch(e){}pomoPaint();}
function pomoTick(){if(!POMO.run)return;POMO.t--;if(POMO.t<=0){pomoDone();return;}pomoPaint();}
function setupPomodoro(){pomoPaint();const s=$('#pomoStart'),r=$('#pomoReset');if(s)s.onclick=()=>{POMO.run=!POMO.run;if(POMO.run&&!POMO.iv)POMO.iv=setInterval(pomoTick,1000);pomoPaint();};if(r)r.onclick=()=>{POMO.run=false;if(POMO.iv){clearInterval(POMO.iv);POMO.iv=null;}POMO.mode='focus';POMO.t=25*60;pomoPaint();};}

async function loadAgenda(){
  const box=$('#agenda');if(!box)return;
  try{const [tk,rm,gl]=await Promise.all([api('/api/list/tasks'),api('/api/list/reminders'),api('/api/list/goals')]);
    const today=new Date().toDateString();
    const tasks=(tk.rows||[]).filter(x=>!x.done);
    const rems=(rm.rows||[]).filter(x=>!x.done&&x.due).sort((a,b)=>a.due-b.due).filter(x=>new Date(x.due*1000).toDateString()===today);
    const goals=(gl.rows||[]).filter(x=>!x.done);
    const hd=t=>`<div class="agenda-h">${t}</div>`;
    let h='';
    if(rems.length)h+=hd('⏰ DUE TODAY')+rems.slice(0,6).map(x=>`<div class="agenda-row"><span class="tm">${new Date(x.due*1000).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span><span>${escapeHtml(x.text)}</span></div>`).join('');
    if(tasks.length)h+=hd('✓ TASKS')+tasks.slice(0,6).map(x=>`<div style="padding:6px 0">• ${escapeHtml(x.text)}</div>`).join('');
    if(goals.length)h+=hd('✦ GOALS')+goals.slice(0,4).map(x=>`<div style="padding:6px 0">• ${escapeHtml(x.text)}</div>`).join('');
    box.innerHTML=h||'<div class="empty" style="padding:12px 0">Nothing scheduled — enjoy the calm.</div>';
  }catch(e){box.innerHTML='<div class="empty" style="padding:12px 0">⚠ couldn’t load agenda</div>';}
}

async function brainAsk(kind){

    if(kind==='brief')text=(await api('/api/reflect/now')).brief;

    else if(kind==='forgot')text=(await api('/krc',{method:'POST',body:JSON.stringify({message:"What am I forgetting? Use my notes, tasks and goals and be specific."})})).reply;
    text=text||'(nothing to surface yet)';card.textContent=text;kspeak(text);setDot(true);

async function loadMemMap(){

/* ---------- MEETINGS (KRC Nano · minutes) ---------- */
const MEET={rec:null,on:false,transcript:'',interim:'',secs:0,t0:0,iv:null,_lastMinutes:''};
function renderMeet(){
  const main=$('#main');
  main.innerHTML=`
    <h1>Meeting minutes</h1>
    <p style="color:var(--dim);margin:4px 2px 10px">KRC listens to your meeting and turns it into a clean summary, decisions and action items — free & on‑device.</p>
    <div class="card focus-card">
      <div class="focus-time" id="meetTime" style="font-size:42px">00:00</div>
      <div class="focus-lbl" id="meetState">Ready when you are</div>
      <div class="focus-btns">
        <button class="pill-btn primary" id="meetToggle">● Record</button>
        <button class="pill-btn" id="meetSum">✨ Summarize</button>
      </div>
    </div>
    <h2 class="sec">Live transcript</h2>
    <div class="card">
      <textarea id="meetText" class="inp" rows="7" placeholder="Words appear here as people speak. You can paste or edit before summarizing." style="min-height:150px;line-height:1.6"></textarea>
      <div style="display:flex;gap:9px;margin-top:10px">
        <button class="pill-btn" id="meetPaste" style="flex:1">📋 Paste</button>
        <button class="pill-btn" id="meetClear" style="flex:1">🗑 Clear</button>
      </div>
    </div>
    <div id="meetOut"></div>`;
  $('#meetToggle').onclick=()=>{if(MEET.on)meetStop();else meetStart();};
  $('#meetSum').onclick=meetSummarize;
  $('#meetPaste').onclick=async()=>{try{const t=await navigator.clipboard.readText();if(t){const el=$('#meetText');el.value=(el.value+' '+t).trim();MEET.transcript=el.value;}}catch(e){$('#meetState').textContent='Couldn’t read clipboard — paste into the box by hand.';}};
  $('#meetClear').onclick=()=>{MEET.transcript='';MEET.interim='';MEET.secs=0;MEET._lastMinutes='';const el=$('#meetText');if(el)el.value='';const tm=$('#meetTime');if(tm)tm.textContent='00:00';const o=$('#meetOut');if(o)o.innerHTML='';$('#meetState').textContent='Cleared';};
  // restore prior session state when returning to the tab
  paintMeetText();const tm=$('#meetTime');if(tm)tm.textContent=pomoFmt(MEET.secs+(MEET.on?Math.floor((Date.now()-MEET.t0)/1000):0));
  if(MEET.on){const b=$('#meetToggle');b.textContent='■ Stop';b.classList.add('rec');$('#meetState').textContent='Listening… speak naturally';}
  if(MEET._lastMinutes)renderMinutes(MEET._lastMinutes);
}
function paintMeetText(){const el=$('#meetText');if(!el)return;const full=(MEET.transcript+(MEET.interim?' '+MEET.interim:'')).trim();if(document.activeElement!==el){el.value=full;el.scrollTop=el.scrollHeight;}}
function meetTick(){if(!MEET.on)return;const s=MEET.secs+Math.floor((Date.now()-MEET.t0)/1000);const el=$('#meetTime');if(el)el.textContent=pomoFmt(s);}
function meetStart(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){$('#meetState').textContent='Live capture needs Chrome or Safari. You can paste a transcript instead.';return;}
  // pull any manual edits into the buffer before we start appending
  const el=$('#meetText');if(el&&el.value.trim())MEET.transcript=el.value.trim();
  const r=new SR();r.lang='en-US';r.interimResults=true;r.continuous=true;
  r.onresult=ev=>{let fin='';MEET.interim='';for(let i=ev.resultIndex;i<ev.results.length;i++){const tx=ev.results[i][0].transcript;if(ev.results[i].isFinal)fin+=tx+' ';else MEET.interim+=tx;}if(fin)MEET.transcript=(MEET.transcript+' '+fin).replace(/\s+/g,' ').trim();paintMeetText();};
  r.onend=()=>{if(MEET.on){try{r.start();}catch(e){}}};   // browsers cut off on silence — keep going while recording
  r.onerror=ev=>{if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){meetStop();const st=$('#meetState');if(st)st.textContent='Microphone blocked — allow mic access, then Record again.';}};
  MEET.rec=r;MEET.on=true;MEET.t0=Date.now();
  try{r.start();}catch(e){}
  if(MEET.iv)clearInterval(MEET.iv);MEET.iv=setInterval(meetTick,1000);
  const b=$('#meetToggle');if(b){b.textContent='■ Stop';b.classList.add('rec');}
  const st=$('#meetState');if(st)st.textContent='Listening… speak naturally';FACE.listening=true;
}
function meetStop(){
  MEET.on=false;if(MEET.rec){try{MEET.rec.stop();}catch(e){}MEET.rec=null;}
  if(MEET.t0)MEET.secs+=Math.floor((Date.now()-MEET.t0)/1000);MEET.t0=0;
  if(MEET.iv){clearInterval(MEET.iv);MEET.iv=null;}
  const b=$('#meetToggle');if(b){b.textContent='● Record';b.classList.remove('rec');}
  const st=$('#meetState');if(st)st.textContent=(MEET.transcript?'Paused · ready to summarize':'Paused · nothing captured yet');FACE.listening=false;
}
async function meetSummarize(){
  if(MEET.on)meetStop();
  const el=$('#meetText');const text=(el?el.value:MEET.transcript||'').trim();MEET.transcript=text;
  const out=$('#meetOut');
  if(text.length<40){out.innerHTML='<div class="msg sys" style="max-width:100%">Record or paste a bit more of the meeting first.</div>';return;}
  if(!cfg.token){out.innerHTML='<div class="msg sys" style="max-width:100%">Connect KRC first (You → Setup).</div>';return;}
  out.innerHTML='<div class="msg krc" style="max-width:100%">✨ Reading the meeting and writing your minutes…</div>';
  const prompt="You are KRC's meeting-minutes engine. From the raw meeting transcript below, write clean professional minutes. Use EXACTLY these section headers, each on its own line, in this order:\n\nSUMMARY:\n(2-3 sentence overview)\n\nKEY POINTS:\n- one point per line\n\nDECISIONS:\n- decisions made (write '- None recorded' if none)\n\nACTION ITEMS:\n- [Owner] task — due/when if mentioned\n\nFOLLOW-UPS:\n- open questions or next steps\n\nBe concise and factual. Do NOT invent names, numbers or facts that are not in the transcript. Transcript:\n\n"+text;
  try{const d=await api('/krc',{method:'POST',body:JSON.stringify({message:prompt})});
    const minutes=((d&&d.reply)||'').trim()||'(KRC returned nothing — try again.)';
    MEET._lastMinutes=minutes;renderMinutes(minutes);setDot(true);kspeak('Your meeting minutes are ready.');
  }catch(e){out.innerHTML='<div class="msg krc" style="max-width:100%">⚠ '+e.message+' — check your connection in You → Setup.</div>';setDot(false);}
}

async function seeStartCam(){
  try{if(SEE.stream)seeStopCam();
    SEE.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:SEE.facing},audio:false});
    const v=$('#seeVid');if(v)v.srcObject=SEE.stream;const hint=$('#seeHint');if(hint)hint.style.display='none';

  }catch(e){const hint=$('#seeHint');if(hint){hint.style.display='flex';hint.textContent='Couldn’t open the camera — allow camera access in your browser.';}return false;}
}
function seeStopCam(){if(SEE.stream){SEE.stream.getTracks().forEach(t=>t.stop());SEE.stream=null;}const v=$('#seeVid');if(v)v.srcObject=null;const b=$('#seeStart');if(b)b.textContent='📷 Start camera';const hint=$('#seeHint');if(hint){hint.style.display='flex';hint.textContent='Tap “Start camera” to let KRC see.';}}
function seeToggleCam(){if(SEE.stream)seeStopCam();else seeStartCam();}
async function seeFlip(){SEE.facing=SEE.facing==='environment'?'user':'environment';if(SEE.stream)await seeStartCam();}
function seeCaptureBlob(){return new Promise(res=>{const v=$('#seeVid');if(!v||!v.videoWidth){res(null);return;}const cv=$('#seeCanvas');const w=640,h=Math.round(640*v.videoHeight/v.videoWidth)||480;cv.width=w;cv.height=h;cv.getContext('2d').drawImage(v,0,0,w,h);cv.toBlob(b=>res(b),'image/jpeg',0.75);});}
async function seeDescribe(robot){

      const r=await fetch(cfg.url+'/api/vision',{method:'POST',headers:{'X-KRC-Token':cfg.token,'Content-Type':'image/jpeg'},body:blob});

}

/* ---------- HAND GESTURES (on-device MediaPipe) ---------- */
const GEST={rec:null,stream:null,running:false,raf:null,last:'',lastAt:0,reactAt:0};
const GEST_MAP={
  Thumb_Up:{e:'👍',say:['Aw, thanks!','Glad you like it!','Yay!']},
  Thumb_Down:{e:'👎',say:["Noted — I'll do better.","Aw, okay."]},
  Open_Palm:{e:'✋',say:['Okay, stopping.','Got it — pausing.'],stop:true},
  Victory:{e:'✌️',say:['Peace!','Nice one!']},
  Pointing_Up:{e:'☝️',say:['Yes?','I’m listening.']},
  Closed_Fist:{e:'✊',say:["Let’s do it!",'Ready when you are.']},
  ILoveYou:{e:'🤟',say:['Aww, I love you too!','You’re the best.']},
};
function renderGest(){
  const main=$('#main');
  main.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin:2px 0 4px">
      <button class="pill-btn" onclick="show('home')" style="padding:8px 14px">‹ Back</button>
      <h1 style="margin:0;font-size:24px">Gestures</h1>
    </div>
    <p style="color:var(--dim);margin:2px 2px 10px">Wave a hand at the camera and KRC reacts — all on‑device, free. (Works on KRC Desk or your phone; the Nano has no camera.)</p>
    <div class="card" style="padding:10px">
      <div style="position:relative;border-radius:14px;overflow:hidden;background:#05070f;aspect-ratio:4/3">
        <video id="gestVid" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)"></video>
        <div id="gestNow" style="position:absolute;right:10px;bottom:10px;text-align:center;background:rgba(10,12,26,.6);border-radius:14px;padding:8px 12px;backdrop-filter:blur(6px);font-weight:700;font-size:13px"><div style="font-size:46px;opacity:.35">✋</div><div style="color:var(--faint)">show a gesture…</div></div>
      </div>
      <button class="pill-btn primary" id="gestToggle" style="width:100%;margin-top:10px">▶ Start</button>
      <div class="focus-lbl" id="gestState" style="margin-top:8px">Ready</div>
    </div>
    <h2 class="sec">KRC knows these</h2>
    <div class="chips">${Object.entries(GEST_MAP).map(([k,v])=>`<div class="chip" style="cursor:default">${v.e} ${k.replace(/_/g,' ')}</div>`).join('')}</div>
    <div id="gestLog" style="margin-top:12px"></div>`;
  $('#gestToggle').onclick=()=>{GEST.running?gestStop():gestStart();};
}
async function gestLoad(){
  if(GEST.rec)return GEST.rec;
  const V=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const fs=await V.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  GEST.rec=await V.GestureRecognizer.createFromOptions(fs,{
    baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task'},
    runningMode:'VIDEO',numHands:1});
  return GEST.rec;
}
async function gestStart(){
  const st=$('#gestState');
  if(st)st.textContent='Loading gesture engine… (first time downloads once)';
  try{await gestLoad();}catch(e){if(st)st.textContent='⚠ Couldn’t load the gesture engine (needs internet the first time). '+(e.message||'');return;}
  try{GEST.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});}catch(e){if(st)st.textContent='Allow camera access to use gestures.';return;}
  const v=$('#gestVid');if(v){v.srcObject=GEST.stream;try{await v.play();}catch(e){}}
  GEST.running=true;const b=$('#gestToggle');if(b)b.textContent='⏹ Stop';
  if(st)st.textContent='Watching your hand — try 👍 ✋ ✌️';
  gestTick();
}
function gestStop(){
  GEST.running=false;if(GEST.raf)cancelAnimationFrame(GEST.raf);GEST.raf=null;
  if(GEST.stream){GEST.stream.getTracks().forEach(t=>t.stop());GEST.stream=null;}
  const v=$('#gestVid');if(v)v.srcObject=null;const b=$('#gestToggle');if(b)b.textContent='▶ Start';
  const st=$('#gestState');if(st)st.textContent='Stopped';GEST.last='';
}
function gestTick(){
  if(!GEST.running){return;}
  const v=$('#gestVid');
  if(v&&v.videoWidth&&GEST.rec){
    let res=null;try{res=GEST.rec.recognizeForVideo(v,performance.now());}catch(e){}
    const g=res&&res.gestures&&res.gestures[0]&&res.gestures[0][0];
    gestHandle(g?g.categoryName:'None',g?g.score:0);
  }
  GEST.raf=requestAnimationFrame(gestTick);
}
function gestHandle(name,score){
  const m=GEST_MAP[name];const now=performance.now();const disp=$('#gestNow');
  if(disp)disp.innerHTML=(m&&score>=0.5)?`<div style="font-size:46px">${m.e}</div><div>${name.replace(/_/g,' ')}</div>`:`<div style="font-size:46px;opacity:.35">✋</div><div style="color:var(--faint)">show a gesture…</div>`;
  if(!m||score<0.5){GEST.last='';return;}
  if(name!==GEST.last){GEST.last=name;GEST.lastAt=now;return;}
  if(now-GEST.lastAt>500 && now-GEST.reactAt>2200){
    GEST.reactAt=now;
    if(m.stop){try{speechSynthesis.cancel();}catch(e){}}
    const line=m.say[Math.floor(Math.random()*m.say.length)];
    const log=$('#gestLog');if(log){const d=document.createElement('div');d.className='msg krc';d.style.maxWidth='100%';d.textContent=m.e+' '+line;log.insertBefore(d,log.firstChild);while(log.children.length>6)log.removeChild(log.lastChild);}
    kspeak(line);
  }
}

function browserSpeak(text){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);const v=pickVoice();if(v){u.voice=v;u.lang=v.lang;}else u.lang='en-GB';u.rate=0.96;u.pitch=0.9;FACE.speaking=true;u.onend=()=>{FACE.speaking=false;};u.onerror=()=>{FACE.speaking=false;};speechSynthesis.speak(u);}catch(e){}}
let _elAudio=null;
async function elevenSpeak(text){try{FACE.speaking=true;const r=await fetch(cfg.url+'/api/tts',{method:'POST',headers:{'X-KRC-Token':cfg.token,'Content-Type':'application/json'},body:JSON.stringify({text})});if(!r.ok)throw new Error('tts '+r.status);const url=URL.createObjectURL(await r.blob());try{if(_elAudio)_elAudio.pause();}catch(e){}_elAudio=new Audio(url);_elAudio.onended=()=>{FACE.speaking=false;URL.revokeObjectURL(url);};_elAudio.onerror=()=>{FACE.speaking=false;};await _elAudio.play();}catch(e){FACE.speaking=false;browserSpeak(text);}}
function speak(text){if(!text)return;if(cfg.eleven)elevenSpeak(text);else browserSpeak(text);}

/* ---------- push ---------- */
function urlB64ToU8(b64){const pad='='.repeat((4-b64.length%4)%4);const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(s);const arr=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr;}
function pushStatus(t){const el=$('#pushStatus');if(el)el.textContent=t;}
async function enablePush(){
  try{if(!('serviceWorker'in navigator)||!('PushManager'in window)){pushStatus('This browser can’t do push. On iPhone, install KRC to your Home Screen first, open it from there, then try again.');return;}
    if(!cfg.token){pushStatus('Connect KRC first.');return;}
    const perm=await Notification.requestPermission();if(perm!=='granted'){pushStatus('Notifications weren’t allowed.');return;}
    const reg=await navigator.serviceWorker.ready;const v=await api('/api/push/vapid');if(!v.enabled||!v.publicKey){pushStatus('Server push isn’t configured yet (VAPID keys).');return;}
    let sub=await reg.pushManager.getSubscription();if(sub){try{await sub.unsubscribe();}catch(_){}}
    sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToU8(v.publicKey)});
    const j=(sub&&sub.toJSON)?sub.toJSON():sub;if(!j||!j.endpoint){pushStatus('⚠ Couldn’t read the subscription. On iPhone open KRC from the Home Screen.');return;}
    const res=await api('/api/push/subscribe',{method:'POST',body:JSON.stringify({subscription:j})});
    if(res&&res.ok){localStorage.krcPush='1';pushStatus('✓ Notifications on ('+res.subs+' device'+(res.subs==1?'':'s')+').');}else pushStatus('⚠ Saved on device but server didn’t store it.');
  }catch(e){pushStatus('⚠ '+e.message);}
}
async function testPush(){try{const r=await api('/api/push/test');pushStatus(r.sent?('Sent — check your notifications.'):'No subscribed devices yet — tap “Enable” first.');}catch(e){pushStatus('⚠ '+e.message);}}

/* ---------- settings sync ---------- */
async function syncSettingsDown(){if(!cfg.token)return;try{const d=await api('/api/settings');const s=d.settings||{};if('speak'in s)cfg.speak=!!s.speak;if('eleven'in s)cfg.eleven=!!s.eleven;if(s.voice)localStorage.krcVoice=s.voice;if(view==='profile')renderProfile();}catch(e){}}
async function syncSettingsUp(){if(!cfg.token)return;try{await api('/api/settings',{method:'POST',body:JSON.stringify({settings:{speak:cfg.speak,eleven:cfg.eleven,voice:localStorage.krcVoice||''}})});}catch(e){}}

/* ---------- LISTS (segmented) ---------- */
function renderLists(){
  const main=$('#main');
  main.innerHTML=`<h1>Lists</h1>
    <div class="seg" id="seg">
      ${Object.keys(KIND_TITLE).map(k=>`<button data-k="${k}" class="${k===listKind?'on':''}">${KIND_TITLE[k]}</button>`).join('')}
    </div>
    <div id="listHost"></div>`;
  main.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{listKind=b.dataset.k;main.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x.dataset.k===listKind));renderListInto();});
  renderListInto();
}
async function renderListInto(){
  const host=$('#listHost');if(!host)return;const kind=listKind;
  const single=kind.replace(/s$/,''),isNotes=kind==='notes',isRem=kind==='reminders';
  let addHtml;
  if(isRem){addHtml=`<div class="card" style="margin-bottom:14px"><input id="addInp" class="inp" placeholder="Remind me to…" style="margin-bottom:9px"/><div style="display:flex;gap:9px;margin-bottom:10px"><input id="addWhen" class="inp" type="datetime-local"/><button class="add" id="addBtn">+</button></div><div class="chips" id="quickT"><button class="chip" data-m="15">+15m</button><button class="chip" data-m="30">+30m</button><button class="chip" data-m="60">+1h</button><button class="chip" data-m="180">+3h</button><button class="chip" data-m="1440">+1 day</button></div></div>`;}
  else if(isNotes){addHtml=`<div class="quick"><textarea id="addInp" class="inp" rows="2" placeholder="New note… or tap mic to dictate"></textarea><button class="add" id="dictBtn" title="Dictate" style="background:var(--glass2);color:var(--cyan);font-size:18px">🎤</button><button class="add" id="addBtn">+</button></div>`;}
  else{addHtml=`<div class="quick"><input id="addInp" class="inp" placeholder="Add a ${single}…"/><button class="add" id="addBtn">+</button></div>`;}
  host.innerHTML=`${addHtml}<div class="lwrap"><div class="empty">loading…</div></div>`;
  const ai=$('#addInp'),ab=$('#addBtn');
  const doAdd=()=>{if(isRem){addReminder(ai.value,$('#addWhen').value);}else createItem(kind,ai.value).then(ok=>{if(ok)ai.value='';});};
  if(ab){ab.onclick=doAdd;ai.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doAdd();}});}
  if(isNotes){const db=$('#dictBtn');if(db)db.onclick=()=>dictateInto(ai,db);}
  if(isRem){host.querySelectorAll('#quickT button').forEach(b=>b.onclick=()=>{const t=ai.value.trim();if(!t){ai.focus();return;}createReminderMins(t,+b.dataset.m);ai.value='';});}
  if(!cfg.token){host.querySelector('.lwrap').innerHTML='<div class="empty">Connect KRC first (You → Setup).</div>';return;}
  try{const d=await api('/api/list/'+kind);setDot(true);const rows=d.rows||[];const wrap=host.querySelector('.lwrap');wrap.innerHTML='';
    if(!rows.length){wrap.innerHTML=`<div class="empty">${orbHTML('small eorb')}Nothing in ${KIND_TITLE[kind]} yet.</div>`;return;}
    rows.forEach(it=>wrap.appendChild(buildRow(kind,it,isNotes)));
  }catch(e){setDot(false);host.querySelector('.lwrap').innerHTML='<div class="empty">⚠ '+e.message+'</div>';}
}
let _dictRec=null;
function dictateInto(el,btn){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Voice input needs Chrome or Safari.');return;}if(_dictRec){try{_dictRec.stop();}catch(e){}_dictRec=null;if(btn)btn.classList.remove('on');return;}const r=new SR();r.lang='en-US';r.interimResults=true;r.continuous=true;let base=el.value;if(btn)btn.classList.add('on');r.onresult=ev=>{let fin='',interim='';for(let i=ev.resultIndex;i<ev.results.length;i++){const tx=ev.results[i][0].transcript;if(ev.results[i].isFinal)fin+=tx;else interim+=tx;}if(fin)base=(base?base+' ':'')+fin.trim();el.value=(base+(interim?' '+interim:'')).trim();};r.onend=()=>{if(btn)btn.classList.remove('on');_dictRec=null;};r.onerror=()=>{if(btn)btn.classList.remove('on');_dictRec=null;};try{r.start();_dictRec=r;}catch(e){if(btn)btn.classList.remove('on');}}
function timeLabel(due){if(!due)return '';const d=new Date(due*1000),now=new Date();const t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});const tom=new Date(now);tom.setDate(now.getDate()+1);let day=d.toDateString()===now.toDateString()?'Today':d.toDateString()===tom.toDateString()?'Tomorrow':d.toLocaleDateString([],{month:'short',day:'numeric'});const diff=Math.round((due*1000-now.getTime())/60000);let rel;if(diff<=-1)rel='overdue';else if(diff<=0)rel='now';else if(diff<60)rel='in '+diff+'m';else if(diff<1440)rel='in '+Math.floor(diff/60)+'h'+(diff%60?(' '+diff%60+'m'):'');else rel='in '+Math.floor(diff/1440)+'d';return day+', '+t+' · '+rel;}
function buildRow(kind,it,isNotes){
  const sw=document.createElement('div');sw.className='swipe';
  const del=document.createElement('button');del.className='del';del.textContent='Delete';del.onclick=e=>{e.stopPropagation();delItem(kind,it.id,sw);};
  const row=document.createElement('div');row.className='row'+(it.done?' done':'');
  const cb=isNotes?'':`<div class="cb${it.done?' on':''}">${it.done?'✓':''}</div>`;
  const sub=it.due?`<span class="subt">${timeLabel(it.due)}</span>`:'';
  row.innerHTML=`${cb}<div style="flex:1;min-width:0"><div class="t">${escapeHtml(it.text)}</div>${sub}</div>`;
  if(!isNotes)row.querySelector('.cb').onclick=e=>{e.stopPropagation();toggle(kind,it.id,!it.done);};
  const tEl=row.querySelector('.t');
  attachRow(row,sw,{tapEl:tEl,onTapText:()=>startEdit(tEl,kind,it)});
  sw.appendChild(del);sw.appendChild(row);return sw;
}
function startEdit(tEl,kind,it){if(tEl.querySelector('input'))return;const cur=it.text;tEl.innerHTML=`<input class="inp" style="padding:8px 11px" value="${escapeHtml(cur)}"/>`;const inp=tEl.querySelector('input');inp.focus();try{inp.setSelectionRange(cur.length,cur.length);}catch(e){}const save=()=>{const nt=inp.value.trim();tEl.textContent=nt||cur;if(nt&&nt!==cur){it.text=nt;editItem(kind,it.id,nt);}};inp.addEventListener('blur',save);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});}
function attachRow(row,sw,{tapEl,onTapText}){let x0=null,y0=null,dx=0,open=false,moved=false;const W=84,set=v=>row.style.transform='translateX('+v+'px)';
  row.addEventListener('pointerdown',e=>{if(e.target.tagName==='INPUT'||e.target.classList.contains('cb')||e.target.classList.contains('del'))return;x0=e.clientX;y0=e.clientY;moved=false;row.style.transition='none';});
  row.addEventListener('pointermove',e=>{if(x0==null)return;const d=e.clientX-x0;if(Math.abs(d)>6||Math.abs(e.clientY-y0)>6)moved=true;dx=Math.min(0,Math.max(-W,d+(open?-W:0)));set(dx);});
  const end=e=>{if(x0==null)return;row.style.transition='transform .18s ease';if(!moved){set(open?-W:0);open=false;if(tapEl&&(e.target===tapEl||tapEl.contains(e.target)))onTapText&&onTapText();}else{open=dx<-W/2;set(open?-W:0);}x0=null;};
  row.addEventListener('pointerup',end);row.addEventListener('pointercancel',()=>{if(x0!=null){row.style.transition='transform .18s ease';set(open?-W:0);x0=null;}});}
async function createItem(kind,text){text=(text||'').trim();if(!text)return false;try{await api('/api/create',{method:'POST',body:JSON.stringify({kind,text})});setDot(true);}catch(e){setDot(false);return false;}kspeak("Done — added that to your "+(KIND_TITLE[kind]||kind)+".");if(view==='lists'&&listKind===kind)renderListInto();return true;}
async function addReminder(text,when){text=(text||'').trim();if(!text)return false;const body={kind:'reminders',text};if(when){const t=new Date(when).getTime();if(!isNaN(t))body.due_ts=Math.round(t/1000);}try{await api('/api/create',{method:'POST',body:JSON.stringify(body)});setDot(true);}catch(e){setDot(false);return false;}kspeak("Reminder set.");if(view==='lists'&&listKind==='reminders')renderListInto();return true;}
async function createReminderMins(text,mins){try{await api('/api/create',{method:'POST',body:JSON.stringify({kind:'reminders',text,mins})});setDot(true);}catch(e){setDot(false);return;}kspeak("Reminder set for "+(mins<60?mins+' minutes':mins<1440?(mins/60)+' hours':'tomorrow')+".");if(view==='lists'&&listKind==='reminders')renderListInto();}
async function toggle(kind,id,on){try{await api('/api/item/toggle',{method:'POST',body:JSON.stringify({kind,id})});setDot(true);}catch(e){setDot(false);}kspeak(on?"Nice — checked off.":"Okay, back on your list.");if(view==='lists'&&listKind===kind)renderListInto();}
async function delItem(kind,id,swEl){if(swEl){swEl.style.transition='.18s';swEl.style.opacity='0';swEl.style.transform='scale(.96)';}try{await api('/api/item/delete',{method:'POST',body:JSON.stringify({kind,id})});setDot(true);}catch(e){setDot(false);}setTimeout(()=>{if(view==='lists'&&listKind===kind)renderListInto();},180);}
async function editItem(kind,id,text){try{await api('/api/item/edit',{method:'POST',body:JSON.stringify({kind,id,text})});setDot(true);}catch(e){setDot(false);}}

/* ---------- PWA install ---------- */
let _deferredInstall=null;
const isStandalone=()=>matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredInstall=e;});
window.addEventListener('appinstalled',()=>{_deferredInstall=null;});
async function installApp(){if(_deferredInstall){_deferredInstall.prompt();try{await _deferredInstall.userChoice;}catch(e){}_deferredInstall=null;return true;}return false;}
function installHint(){if(isStandalone())return 'KRC is installed ✓';if(isIOS())return 'iPhone: tap Share (□↑) in Safari → “Add to Home Screen”.';return 'Open browser menu (⋮) → “Install app”.';}

/* ===================== BOOT ===================== */
function boot(){
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
  $('#sendBtn').onclick=send;$('#micBtn').onclick=startVoice;
  $('#chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
  // Deep-link: an away-screen push opens straight to the Remote Control (PC) view.
  const wantPC=(location.hash==='#pc');
  if(wantPC){pcAutoShot=true;history.replaceState(null,'',location.pathname+location.search);}
  show(wantPC?'pc':'home');
  if(cfg.token){api('/api/health').then(()=>setDot(true)).catch(()=>setDot(false));syncSettingsDown();}
}
// The service worker asks us to route here when a "krc-away-screen" notification is tapped.
if('serviceWorker'in navigator)navigator.serviceWorker.addEventListener('message',ev=>{
  const m=ev.data||{};if(m.krc==='route'&&m.view==='pc'){if(typeof show==='function'){pcAutoShot=true;show('pc');}}
});
// decide: onboarding vs app
if(cfg.onboarded && cfg.token){
  $('#onb').classList.add('hide');$('#app').classList.add('show');boot();
}else{
  // if a token arrived via QR but never onboarded, still walk them through the quick flow
  startOnboarding();
}
if('serviceWorker'in navigator && location.protocol.startsWith('http'))navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
