<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#04070c"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg"/>
<title>KRC</title>
<style>
  :root{
    --bg:#070b14; --panel:#0e1726; --card:#0e1726; --card2:#121d30;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
    --cyan:#39e0ff; --accent:#39e0ff; --accent2:#4f8cff;
    --grad:linear-gradient(135deg,#39e0ff,#4f8cff);
    --dim:#8aa3ba; --txt:#eaf4fb; --danger:#ff4d5e; --good:#34d27b;
    --r:16px; --sh:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;color:var(--txt);overscroll-behavior:none;
    font:15px/1.45 -apple-system,"Segoe UI",system-ui,Roboto,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#11233f 0%,var(--bg) 58%) fixed}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;position:relative}
  header{display:flex;align-items:center;gap:11px;padding:16px 18px 10px}
  header .logo{font-weight:800;letter-spacing:.15em;font-size:21px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  header .sub{color:var(--dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:#c0392b;margin-left:auto;box-shadow:0 0 8px #c0392b;transition:.3s}
  .dot.on{background:var(--good);box-shadow:0 0 12px var(--good)}
  main{flex:1;overflow-y:auto;padding:6px 16px 100px}
  .chatview main{padding-bottom:168px}
  /* floating bottom nav — Alexa-style pill bar */
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:calc(100% - 24px);max-width:576px;
    display:flex;justify-content:space-around;gap:2px;padding:8px 6px;z-index:40;
    background:rgba(14,23,38,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:22px;box-shadow:var(--sh)}
  nav button{flex:1;background:none;border:0;color:var(--dim);padding:7px 2px;font-size:10px;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:14px;transition:.2s}
  nav button .i{font-size:18px}
  nav button.on{color:#04121f;background:var(--grad);font-weight:700}
  h1{font-size:25px;font-weight:800;margin:8px 2px 2px;letter-spacing:-.01em}
  h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:22px 2px 11px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
  .msg{max-width:84%;padding:11px 15px;border-radius:18px;margin:8px 0;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
  .msg.you{background:var(--grad);color:#04121f;margin-left:auto;border-bottom-right-radius:5px;font-weight:500}
  .msg.krc{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.sys{background:none;color:var(--dim);font-size:12px;text-align:center;max-width:100%}
  .composer{display:flex;gap:9px;align-items:center;padding:6px 8px 6px 16px;position:fixed;bottom:86px;left:50%;
    transform:translateX(-50%);width:calc(100% - 24px);max-width:576px;z-index:39;
    background:rgba(10,16,28,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:28px;box-shadow:var(--sh)}
  .composer input{flex:1;background:transparent;border:0;color:var(--txt);padding:9px 4px;font-size:16px;outline:none}
  .composer button{background:var(--grad);color:#04121f;border:0;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;flex:0 0 auto}
  .mic{background:var(--card2)!important;color:var(--accent)!important}
  .mic.on{box-shadow:0 0 14px var(--accent)}
  #face{display:block;width:100%;max-width:320px;margin:6px auto 10px;border-radius:18px}
  /* list rows — iPhone style, swipe-left to delete, tap text to edit */
  .lwrap{display:flex;flex-direction:column;gap:9px}
  .swipe{position:relative;border-radius:14px;overflow:hidden}
  .swipe .del{position:absolute;top:0;right:0;height:100%;width:84px;background:var(--danger);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:0;cursor:pointer}
  .row{display:flex;align-items:center;gap:13px;padding:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;position:relative;transition:transform .18s ease;touch-action:pan-y;will-change:transform}
  .cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--dim);flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;color:#04121f;font-size:14px;cursor:pointer;transition:.15s}
  .cb.on{border-color:transparent;background:var(--grad)}
  .row .t{flex:1;min-width:0;word-wrap:break-word}
  .row .sub{display:block;color:var(--accent);font-size:12px;margin-top:3px}
  .row.done .t{color:var(--dim);text-decoration:line-through}
  .row .time{color:var(--accent);font-size:12px}
  .empty{color:var(--dim);text-align:center;padding:42px 0}
  .bar{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
  .bar button{background:var(--card);border:1px solid var(--line);color:var(--accent);border-radius:11px;padding:8px 13px;cursor:pointer;font-size:13px}
  .addbar{display:flex;gap:9px;margin-bottom:14px}
  .addbar .f{flex:1}
  .add{background:var(--grad);color:#04121f;border:0;border-radius:13px;width:48px;font-size:24px;line-height:1;cursor:pointer;font-weight:600;flex:0 0 auto}
  label{display:block;color:var(--dim);font-size:12px;margin:16px 0 6px;letter-spacing:.04em}
  input.f,select.f,textarea.f{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:13px;padding:13px 15px;font-size:16px;outline:none;font-family:inherit}
  input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--accent)}
  .btn{background:var(--grad);color:#04121f;border:0;border-radius:13px;padding:14px;width:100%;font-size:15px;font-weight:700;margin-top:18px;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--accent)}
  .status{margin-top:14px;color:var(--dim);font-size:13px;white-space:pre-wrap}
  .hide{display:none}
</style>
</head>
<body>
<div id="app">
  <header><span class="logo">KRC</span><span class="sub" id="hsub">companion</span><span class="dot" id="dot"></span></header>
  <main id="main"></main>
  <div class="composer hide" id="composer">
    <button class="composer mic" id="micBtn" style="padding:0" title="Talk">🎤</button>
    <input id="chatInput" placeholder="Talk to KRC…" autocomplete="off"/>
    <button id="sendBtn">➤</button>
  </div>
  <nav id="nav">
    <button data-v="home" class="on"><span class="i">◎</span>Home</button>
    <button data-v="chat"><span class="i">💬</span>Chat</button>
    <button data-v="tasks"><span class="i">✓</span>Tasks</button>
    <button data-v="notes"><span class="i">📝</span>Notes</button>
    <button data-v="reminders"><span class="i">⏰</span>Remind</button>
    <button data-v="goals"><span class="i">✦</span>Goals</button>
    <button data-v="settings"><span class="i">⚙</span>Setup</button>
  </nav>
</div>
<script>
const $ = s => document.querySelector(s);
const main = $('#main'), composer = $('#composer'), dot = $('#dot');
const cfg = {
  get url(){ return (localStorage.krcUrl || 'https://krc-cloud.onrender.com').replace(/\/+$/,''); },
  set url(v){ localStorage.krcUrl = v; },
  get token(){ return localStorage.krcToken || ''; },
  set token(v){ localStorage.krcToken = v; },
  get speak(){ return localStorage.krcSpeak !== '0'; },
  set speak(v){ localStorage.krcSpeak = v ? '1':'0'; },
  get eleven(){ return localStorage.krcEleven === '1'; },
  set eleven(v){ localStorage.krcEleven = v ? '1':'0'; },
};
// One-scan setup: a QR link like ?token=XXX&url=YYY auto-fills config, then cleans the URL bar.
// Re-apply token/url from the launch URL on EVERY open. Critical for iOS: a home-screen
// PWA has its own isolated storage, so the token must ride in the start URL each launch.
// We do NOT strip the query (iOS would then save a tokenless shortcut). Stays on-device only.
(function(){ try{ const q=new URLSearchParams(location.search);
  if(q.get('token')) cfg.token=q.get('token');
  if(q.get('url'))   cfg.url=q.get('url');
}catch(e){} })();
// If launched/focused from a "📎 File ready" notification (url carries ?krcfile=NAME),
// surface the download card automatically once the page is ready.
window.addEventListener('load',()=>{ try{
  const f=new URLSearchParams(location.search).get('krcfile');
  if(f) setTimeout(()=>showFile('/api/pc/file/last',decodeURIComponent(f)),300);
}catch(e){} });
// ---------- install as a real app (PWA) ----------
let _deferredInstall=null;
const isStandalone=()=>matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); _deferredInstall=e; maybeInstallBanner(); });
window.addEventListener('appinstalled',()=>{ _deferredInstall=null; const b=$('#installBanner'); if(b) b.remove(); });
async function installApp(){
  if(_deferredInstall){ _deferredInstall.prompt(); try{ await _deferredInstall.userChoice; }catch(e){}
    _deferredInstall=null; const b=$('#installBanner'); if(b) b.remove(); return true; }
  return false;   // iOS / already-installable-via-menu: caller shows the hint
}
function installHint(){
  if(isStandalone()) return 'KRC is installed ✓';
  if(isIOS()) return 'On iPhone: tap the Share button (the box with ↑) in Safari, then “Add to Home Screen”.';
  return 'Open your browser menu (⋮) and choose “Install app” / “Add to Home screen”.';
}
function maybeInstallBanner(){
  if(isStandalone()||$('#installBanner')||localStorage.krcInstallDismiss==='1') return;
  if(!_deferredInstall&&!isIOS()) return;
  const b=document.createElement('div'); b.id='installBanner';
  b.style.cssText='position:fixed;left:10px;right:10px;bottom:72px;z-index:60;background:#0c1726;'+
    'border:1px solid #1d3346;border-radius:12px;padding:10px 12px;display:flex;align-items:center;'+
    'gap:10px;box-shadow:0 6px 24px rgba(0,0,0,.45)';
  b.innerHTML='<span style="font-size:20px">📲</span>'+
    '<span style="flex:1;font-size:13px;color:#bcd">Install KRC as an app</span>';
  const go=document.createElement('button'); go.textContent=_deferredInstall?'Install':'How';
  go.style.cssText='background:#1f6feb;color:#fff;border:0;border-radius:8px;padding:7px 13px;font-weight:600';
  go.onclick=async()=>{ if(!(await installApp())) alert(installHint()); };
  const x=document.createElement('button'); x.textContent='✕';
  x.style.cssText='background:transparent;color:#789;border:0;font-size:16px;cursor:pointer';
  x.onclick=()=>{ localStorage.krcInstallDismiss='1'; b.remove(); };
  b.appendChild(go); b.appendChild(x); document.body.appendChild(b);
}
window.addEventListener('load',()=> setTimeout(maybeInstallBanner,1200));
let view='home', voiceOn=false;
const chat=[];
const KIND_TITLE={tasks:'Tasks',notes:'Notes',reminders:'Reminders',goals:'Goals'};
function kspeak(t){ if(cfg.speak && t) speak(t); }
function setDot(on){ dot.classList.toggle('on', !!on); }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function api(path, opts={}){
  const headers = Object.assign({'X-KRC-Token':cfg.token}, opts.headers||{});
  if (opts.body) headers['Content-Type']='application/json';
  const r = await fetch(cfg.url+path, Object.assign({}, opts, {headers}));
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function show(v){
  view=v;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.v===v));
  document.getElementById('app').classList.toggle('chatview', v==='chat');
  composer.classList.toggle('hide', v!=='chat');
  if (v==='home') renderHome(); else if (v==='chat') renderChat(); else if (v==='settings') renderSettings(); else renderList(v);
}

// ---------- Home + second-brain feed ----------
// ---------- Pomodoro focus timer (runs in the background across views) ----------
const POMO={t:25*60,run:false,mode:'focus',iv:null};
function pomoFmt(s){ const m=Math.floor(s/60),x=s%60; return (m<10?'0':'')+m+':'+(x<10?'0':'')+x; }
function pomoPaint(){
  const a=$('#pomoTime'); if(a) a.textContent=pomoFmt(POMO.t);
  const l=$('#pomoLbl'); if(l) l.textContent=(POMO.mode==='focus'?'Pomodoro · focus session':'Break · relax');
  const b=$('#pomoStart'); if(b) b.textContent=POMO.run?'⏸ Pause':'▶ Start';
}
function pomoDone(){
  POMO.run=false; if(POMO.iv){ clearInterval(POMO.iv); POMO.iv=null; }
  const wasFocus=POMO.mode==='focus';
  POMO.mode=wasFocus?'break':'focus'; POMO.t=(wasFocus?5:25)*60;
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
  const msg=wasFocus?'Focus session done — take a 5 minute break.':'Break over — ready to focus again?';
  kspeak(msg);
  try{ if(window.Notification && Notification.permission==='granted') new Notification('KRC',{body:msg,icon:'./icon-192.png'}); }catch(e){}
  pomoPaint();
}
function pomoTick(){ if(!POMO.run) return; POMO.t--; if(POMO.t<=0){ pomoDone(); return; } pomoPaint(); }
function setupPomodoro(){
  pomoPaint();
  const s=$('#pomoStart'), r=$('#pomoReset');
  if(s) s.onclick=()=>{ POMO.run=!POMO.run; if(POMO.run && !POMO.iv) POMO.iv=setInterval(pomoTick,1000); pomoPaint(); };
  if(r) r.onclick=()=>{ POMO.run=false; if(POMO.iv){ clearInterval(POMO.iv); POMO.iv=null; } POMO.mode='focus'; POMO.t=25*60; pomoPaint(); };
}
// ---------- voice dictation (used by Notes) ----------
let _dictRec=null;
function dictateInto(el,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Voice input needs Chrome or Safari.'); return; }
  if(_dictRec){ try{ _dictRec.stop(); }catch(e){} _dictRec=null; if(btn) btn.classList.remove('on'); return; }
  const r=new SR(); r.lang='en-US'; r.interimResults=true; r.continuous=true;
  let base=el.value;
  if(btn) btn.classList.add('on');
  r.onresult=ev=>{ let fin='',interim='';
    for(let i=ev.resultIndex;i<ev.results.length;i++){ const tx=ev.results[i][0].transcript;
      if(ev.results[i].isFinal) fin+=tx; else interim+=tx; }
    if(fin) base=(base?base+' ':'')+fin.trim();
    el.value=(base+(interim?' '+interim:'')).trim();
  };
  r.onend=()=>{ if(btn) btn.classList.remove('on'); _dictRec=null; };
  r.onerror=()=>{ if(btn) btn.classList.remove('on'); _dictRec=null; };
  try{ r.start(); _dictRec=r; }catch(e){ if(btn) btn.classList.remove('on'); }
}
async function renderHome(){
  main.innerHTML = `<h2>Home</h2>
    <div id="hi" class="msg krc" style="max-width:100%">Hi! I'm KRC.</div>
    <div class="addbar"><input id="qAdd" class="f" placeholder="Quick-add a task…"/><button class="add" id="qBtn">+</button></div>
    <h2 style="margin-top:20px">Today</h2>
    <div class="card" id="agenda"><div class="empty" style="padding:10px 0">loading…</div></div>
    <h2 style="margin-top:22px">Focus</h2>
    <div class="card" style="text-align:center">
      <div id="pomoTime" style="font-size:46px;font-weight:800;letter-spacing:.02em">25:00</div>
      <div id="pomoLbl" style="color:var(--dim);font-size:13px;margin-top:2px">Pomodoro · focus session</div>
      <div class="bar" style="justify-content:center;margin-top:12px">
        <button id="pomoStart">▶ Start</button><button id="pomoReset">↺ Reset</button>
      </div>
    </div>
    <h2 style="margin-top:20px">Second brain</h2>
    <div class="bar" style="flex-wrap:wrap;gap:8px">
      <button onclick="brainAsk('brief')">✨ Daily brief</button>
      <button onclick="brainAsk('nudge')">⏳ What's stalled</button>
      <button onclick="brainAsk('insight')">💡 Opportunity</button>
      <button onclick="brainAsk('predict')">🔮 What's next</button>
      <button onclick="brainAsk('forgot')">🧠 Forgetting?</button>
      <button onclick="loadMemMap()">🗺 What KRC knows</button>
    </div>
    <div class="msg krc" id="brainCard" style="max-width:100%;margin-top:10px;display:none"></div>
    <div id="memMap"></div>`;
  setupPomodoro();
  if (!cfg.token){ $('#hi').textContent='Add your token in Setup to begin.'; return; }
  $('#qBtn').onclick = async ()=>{ if(await createItem('tasks', $('#qAdd').value)){ $('#qAdd').value=''; } };
  $('#qAdd').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#qBtn').click(); });
  loadAgenda();
  try{ const h=await api('/api/health'); const r=h.relationship||{};
    const greet=`Hi ${r.user||'there'}! We're on a ${r.streak_days||0}-day streak (${r.interactions||0} chats). What can I help with?`;
    $('#hi').textContent=greet; setDot(true);
    // Living second brain: once per day, KRC OPENS with today's brief (auto), spoken.
    const today=new Date().toISOString().slice(0,10);
    const autoBrief = (localStorage.krcBriefDay!==today);
    if(!window._greeted){ window._greeted=true; if(!autoBrief) kspeak(greet); }
    if(autoBrief){ localStorage.krcBriefDay=today; brainAsk('brief'); }
  }catch(e){ setDot(false); }
}
// Today's agenda — combines today's reminders, open tasks, and today's goals into one card.
async function loadAgenda(){
  const box=$('#agenda'); if(!box) return;
  try{
    const [tk,rm,gl]=await Promise.all([api('/api/list/tasks'),api('/api/list/reminders'),api('/api/list/goals')]);
    const today=new Date().toDateString();
    const tasks=(tk.rows||[]).filter(x=>!x.done);
    const rems=(rm.rows||[]).filter(x=>!x.done&&x.due).sort((a,b)=>a.due-b.due)
                            .filter(x=>new Date(x.due*1000).toDateString()===today);
    const goals=(gl.rows||[]).filter(x=>!x.done);
    const hd=t=>`<div style="margin:4px 0 5px;color:var(--dim);font-size:11px;letter-spacing:.1em">${t}</div>`;
    let h='';
    if(rems.length) h+=hd('⏰ DUE TODAY')+rems.slice(0,6).map(x=>
      `<div style="display:flex;gap:9px;padding:5px 0;align-items:baseline"><span style="color:var(--accent);font-size:13px;min-width:62px">${new Date(x.due*1000).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span><span>${escapeHtml(x.text)}</span></div>`).join('');
    if(tasks.length) h+=hd('✓ TASKS')+tasks.slice(0,6).map(x=>`<div style="padding:5px 0">• ${escapeHtml(x.text)}</div>`).join('');
    if(goals.length) h+=hd('✦ GOALS')+goals.slice(0,4).map(x=>`<div style="padding:5px 0">• ${escapeHtml(x.text)}</div>`).join('');
    box.innerHTML = h || '<div class="empty" style="padding:10px 0">Nothing scheduled — enjoy the calm.</div>';
  }catch(e){ box.innerHTML='<div class="empty" style="padding:10px 0">⚠ couldn\'t load agenda</div>'; }
}
async function brainAsk(kind){
  const card=$('#brainCard'); if(!card) return; card.style.display='block'; card.textContent='thinking…';
  try{
    let text='';
    if(kind==='brief') text=(await api('/api/reflect/now')).brief;
    else if(kind==='nudge') text=(await api('/api/nudge/now')).nudge;
    else if(kind==='insight') text=(await api('/api/insight/now')).insight;
    else if(kind==='predict') text=(await api('/api/predict/now?force=1')).predict;
    else if(kind==='forgot') text=(await api('/krc',{method:'POST',body:JSON.stringify({message:"What am I forgetting? Use my notes, tasks and goals and be specific."})})).reply;
    text=text||'(nothing to surface yet)'; card.textContent=text; kspeak(text); setDot(true);
  }catch(e){ card.textContent='⚠ '+e.message; setDot(false); }
}
const MEMOJI={project:'🛠',goal:'✦',person:'👤',place:'📍',topic:'🏷',task:'✓',event:'📅',thing:'📦',series:'📺',team:'👥',company:'🏢'};
async function loadMemMap(){
  const box=$('#memMap'); if(!box) return;
  if(box.dataset.open==='1'){ box.innerHTML=''; box.dataset.open='0'; return; }   // toggle off
  box.dataset.open='1'; box.innerHTML='<div class="empty">loading your world…</div>';
  try{ const d=await api('/api/memory/graph'); const ents=d.entities||[]; setDot(true);
    if(!ents.length){ box.innerHTML='<div class="empty">KRC is still learning about you.</div>'; return; }
    const g={}; ents.forEach(e=>{ (g[e.etype]=g[e.etype]||[]).push(e); });
    let h='<h2 style="margin-top:18px">What KRC knows about you ('+ents.length+')</h2>';
    Object.keys(g).sort().forEach(k=>{
      h+='<div style="margin:12px 0 2px;color:var(--cyan);font-size:12px;letter-spacing:.08em">'+(MEMOJI[k]||'•')+' '+k.toUpperCase()+' · '+g[k].length+'</div>';
      g[k].forEach(e=>{ h+='<div class="row" style="padding:8px 6px"><div class="t">'+escapeHtml(e.title)+
        (e.content?'<div style="color:var(--dim);font-size:12px">'+escapeHtml(e.content)+'</div>':'')+'</div></div>'; });
    });
    box.innerHTML=h;
  }catch(e){ box.innerHTML='<div class="empty">⚠ '+e.message+'</div>'; box.dataset.open='0'; }
}

// ---------- Chat + live face ----------
function renderChat(){
  main.innerHTML='<canvas id="face" width="300" height="110"></canvas>';
  if(!FACE.running){ FACE.running=true; requestAnimationFrame(drawFace); }

// Show a PC screenshot (or any image the cloud serves) inline in chat. Fetched with
// the token header (so it works on the protected endpoint), then shown as a blob.
async function showShot(path){
  try{
    // The screenshot can land on the cloud a moment after the reply text, so retry
    // a few times on 404 rather than giving up (fixes "says done but no image").
    let r=null;
    for(let i=0;i<5;i++){
      r=await fetch(cfg.url+path,{headers:{'X-KRC-Token':cfg.token}});
      if(r.ok) break;
      if(r.status!==404) return;
      await new Promise(res=>setTimeout(res,1500));
    }
    if(!r||!r.ok) return;
    const url=URL.createObjectURL(await r.blob());
    const d=document.createElement('div'); d.className='msg krc'; d.style.maxWidth='100%';
    const img=document.createElement('img'); img.src=url;
    img.style.cssText='width:100%;border-radius:10px;display:block;cursor:zoom-in';
    img.onclick=()=>window.open(url,'_blank');
    d.appendChild(img); main.appendChild(d); main.scrollTop=main.scrollHeight;
  }catch(e){}
}
// A PC file KRC fetched: a tap-to-save card. On phones a plain <a download> does
// nothing (iOS ignores it, PWAs block the navigation), so we use the native Share
// sheet first (→ Save to Files / send anywhere), then fall back for desktop.
async function showFile(path,name){
  const d=document.createElement('div'); d.className='msg krc';
  d.style.cssText='cursor:pointer;display:flex;align-items:center;gap:8px';
  d.innerHTML='📎 <b>'+name+'</b> <span style="opacity:.6">— tap to save</span>';
  const setS=s=>{ const sp=d.querySelector('span'); if(sp) sp.textContent='— '+s; };
  d.onclick=async()=>{
    setS('fetching…');
    let blob;
    try{
      const r=await fetch(cfg.url+path,{headers:{'X-KRC-Token':cfg.token}});
      if(!r.ok){ setS('failed ('+r.status+')'); return; }
      blob=await r.blob();
    }catch(e){ setS('failed — check connection'); return; }
    // 1) Native share sheet — the reliable save path on phone/tablet.
    try{
      const file=new File([blob],name,{type:blob.type||'application/octet-stream'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:name});
        setS('saved ✓'); return;
      }
    }catch(e){ if(e&&e.name==='AbortError'){ setS('tap to save'); return; } }
    // 2) Desktop: real download via blob link.
    try{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),60000);
      setS('saved ✓'); return;
    }catch(e){}
    // 3) Last resort: just open it so the user can save manually.
    try{ window.open(URL.createObjectURL(blob),'_blank'); setS('opened'); }
    catch(e){ setS('failed'); }
  };
  main.appendChild(d); main.scrollTop=main.scrollHeight;
}

const FACE={emo:'idle',speaking:false,listening:false,running:false,lx:0,ly:0,tlx:0,tly:0,sac:0,blinkT:0,nextBlink:0,emoUntil:0};
const FEMO={idle:{},listening:{h:1.12},thinking:{lookUp:1},speaking:{},excited:{shape:'circle',h:1.05},playful:{},
  affection:{shape:'crescent'},relief:{shape:'crescent'},happy:{shape:'crescent'},sad:{h:0.55,droop:1},concerned:{h:0.7},
  angry:{h:0.7},sleepy:{h:0.3},awe:{shape:'circle',h:1.1},surprised:{shape:'circle',h:1.12},curiosity:{lookUp:1},attention:{h:1.1},
  // full canonical set the cloud can send — without these the face stayed neutral
  suspicion:{h:0.6},mischievous:{h:0.75},naughty:{h:0.8},scared:{shape:'circle',h:1.12},fear:{shape:'circle',h:1.16},
  encouraging:{shape:'crescent'},sarcastic:{h:0.7,lookUp:1},determined:{h:0.85},embarrassed:{h:0.7,droop:1},
  haughty:{h:0.65,lookUp:1},jealous:{h:0.6},shock:{shape:'circle',h:1.2}};
function setFaceEmo(e){ if(FEMO[e]){ FACE.emo=e; FACE.emoUntil=performance.now()+6000; } }
function rrF(g,x,y,w,h,r,col){ r=Math.min(r,h/2,w/2); g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); g.fillStyle=col; g.fill(); }
function drawFace(){
  const c=document.getElementById('face'); if(!c||view!=='chat'){ FACE.running=false; return; }
  const g=c.getContext('2d'),W=c.width,H=c.height,now=performance.now(),t=now/1000;
  if(FACE.emoUntil&&now>FACE.emoUntil){ FACE.emo='idle'; FACE.emoUntil=0; }
  const E=FEMO[FACE.emo]||{}; g.fillStyle='#04070b'; g.fillRect(0,0,W,H);
  let blink=1; if(now>FACE.nextBlink){ FACE.blinkT=now; FACE.nextBlink=now+2000+Math.random()*3000; }
  const bd=now-FACE.blinkT; if(bd<140){ blink=Math.abs(bd-70)/70; blink=0.12+0.88*blink; }
  if(now>FACE.sac){ FACE.tlx=(Math.random()-.5)*10; FACE.tly=(Math.random()-.5)*4; FACE.sac=now+1200+Math.random()*2200; }
  FACE.lx+=(FACE.tlx-FACE.lx)*.08; FACE.ly+=(FACE.tly-FACE.ly)*.08;
  const cx=W/2, cy=H/2+Math.sin(t*1.6)*1.3, gap=44;
  const hMul=(E.h||1)*(FACE.speaking?(1+0.10*Math.abs(Math.sin(t*11))):1), lookY=(E.lookUp?-7:0)+(E.droop?7:0);
  [-1,1].forEach(s=>{ const ex=cx+s*gap, ey=cy;
    if(E.shape==='crescent'){ g.strokeStyle='#f6feff'; g.lineWidth=8; g.lineCap='round'; g.beginPath(); g.arc(ex,ey+4,22,Math.PI*1.16,Math.PI*1.84); g.stroke(); }
    else if(E.shape==='circle'){ const r=24*hMul; rrF(g,ex-r-5,ey-r*blink-5,2*r+10,2*r*blink+10,r,'#23272c'); rrF(g,ex-r-2,ey-r*blink-2,2*r+4,2*r*blink+4,r,'#5b616b');
      g.fillStyle='#f6feff'; g.beginPath(); g.ellipse(ex,ey,r,r*blink,0,0,7); g.fill();
      if(blink>0.5){ g.fillStyle='#0a1622'; g.beginPath(); g.arc(ex+FACE.lx*0.6,ey+FACE.ly*0.6+lookY,7,0,7); g.fill(); } }
    else { const w=42,h=48*hMul*blink; rrF(g,ex-w/2-5,ey-h/2-5,w+10,h+10,16,'#23272c'); rrF(g,ex-w/2-2,ey-h/2-2,w+4,h+4,13,'#5b616b'); rrF(g,ex-w/2,ey-h/2,w,h,12,'#f6feff');
      if(h>14){ const pr=8,mx=w/2-pr-3,my=h/2-pr-3; const px=ex+Math.max(-mx,Math.min(mx,FACE.lx)),py=ey+Math.max(-my,Math.min(my,FACE.ly+lookY)); g.fillStyle='#0a1622'; g.beginPath(); g.arc(px,py,pr,0,7); g.fill(); } }
  });
  if(FACE.listening){ g.strokeStyle='rgba(47,230,255,'+(0.35+0.35*Math.abs(Math.sin(t*6)))+')'; g.lineWidth=2; g.beginPath(); g.arc(cx,cy,66,0,7); g.stroke(); }
  requestAnimationFrame(drawFace);
}

let _voices=[];
function loadVoices(){ try{ _voices=speechSynthesis.getVoices()||[]; }catch(e){ _voices=[]; } }
loadVoices(); if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=loadVoices;
function pickVoice(){
  if(!_voices.length) loadVoices();
  const saved=localStorage.krcVoice; if(saved){ const v=_voices.find(v=>v.name===saved); if(v) return v; }
  const score=v=>{ let s=0; const n=(v.name+' '+v.lang).toLowerCase();
    if(/google uk english male/.test(n)) s+=7; if(/en-gb|united kingdom|uk english/.test(n)) s+=5;
    if(/\b(male|george|daniel|arthur|james|oliver|guy|ryan)\b/.test(n)) s+=4;
    if(/\b(female|zira|hazel|susan|libby|sonia|aria|jenny)\b/.test(n)) s-=4;
    if((v.lang||'').toLowerCase().startsWith('en')) s+=1; return s; };
  return _voices.slice().sort((a,b)=>score(b)-score(a))[0]||null;
}
function browserSpeak(text){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(); if(v){ u.voice=v; u.lang=v.lang; } else u.lang='en-GB'; u.rate=0.96; u.pitch=0.9;
  FACE.speaking=true; u.onend=()=>{FACE.speaking=false;}; u.onerror=()=>{FACE.speaking=false;}; speechSynthesis.speak(u);}catch(e){} }
let _elAudio=null;
async function elevenSpeak(text){
  try{ FACE.speaking=true;
    const r=await fetch(cfg.url+'/api/tts',{method:'POST',headers:{'X-KRC-Token':cfg.token,'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!r.ok) throw new Error('tts '+r.status);
    const url=URL.createObjectURL(await r.blob()); try{ if(_elAudio) _elAudio.pause(); }catch(e){}
    _elAudio=new Audio(url); _elAudio.onended=()=>{FACE.speaking=false;URL.revokeObjectURL(url);}; _elAudio.onerror=()=>{FACE.speaking=false;}; await _elAudio.play();
  }catch(e){ FACE.speaking=false; browserSpeak(text); }
}

// ---------- push notifications (KRC reaches you when the app is closed) ----------
function urlB64ToU8(b64){ const pad='='.repeat((4-b64.length%4)%4); const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
function pushStatus(t){ const el=$('#pushStatus'); if(el) el.textContent=t; }
async function enablePush(){
  try{
    if(!('serviceWorker'in navigator)||!('PushManager'in window)){
      pushStatus('This browser can’t do push. On iPhone, first install KRC to your Home Screen (Share → Add to Home Screen), open it from there, then try again.'); return; }
    if(!cfg.token){ pushStatus('Add your token above and Save first.'); return; }
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ pushStatus('Notifications weren’t allowed (you can enable them in settings).'); return; }
    const reg=await navigator.serviceWorker.ready;
    const v=await api('/api/push/vapid');
    if(!v.enabled||!v.publicKey){ pushStatus('Server push isn’t configured yet (VAPID keys).'); return; }
    let sub=await reg.pushManager.getSubscription();
    if(sub){ try{ await sub.unsubscribe(); }catch(_){} }   // drop any stale/wrong-key sub, then resubscribe fresh
    sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToU8(v.publicKey)});
    const j=(sub&&sub.toJSON)?sub.toJSON():sub;   // iOS: serialize explicitly (endpoint+keys)
    if(!j||!j.endpoint){ pushStatus('⚠ Couldn’t read the subscription from this device. On iPhone make sure you opened KRC from the Home Screen (not Safari).'); return; }
    const res=await api('/api/push/subscribe',{method:'POST',body:JSON.stringify({subscription:j})});
    if(res&&res.ok){ localStorage.krcPush='1'; pushStatus('✓ Notifications on ('+res.subs+' device'+(res.subs==1?'':'s')+'). KRC will ping you with briefs & insights.'); }
    else pushStatus('⚠ Saved on device but server didn’t store it (endpoint:'+(res&&res.got_endpoint)+' keys:'+(res&&res.got_keys)+' subs:'+(res&&res.subs)+'). Tell Claude this line.');
  }catch(e){ pushStatus('⚠ '+e.message); }
}
async function testPush(){ try{ const r=await api('/api/push/test');
  pushStatus(r.sent? ('Sent — check your notifications ('+r.sent+' device'+(r.sent>1?'s':'')+').') : 'No subscribed devices yet — tap “Enable” first.');
}catch(e){ pushStatus('⚠ '+e.message); } }

function timeLabel(due){
  if(!due) return '';
  const d=new Date(due*1000), now=new Date();
  const t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  const tom=new Date(now); tom.setDate(now.getDate()+1);
  let day = d.toDateString()===now.toDateString() ? 'Today'
          : d.toDateString()===tom.toDateString() ? 'Tomorrow'
          : d.toLocaleDateString([],{month:'short',day:'numeric'});
  const diff=Math.round((due*1000-now.getTime())/60000);   // minutes to due
  let rel;
  if(diff<=-1) rel='overdue';
  else if(diff<=0) rel='now';
  else if(diff<60) rel='in '+diff+'m';
  else if(diff<1440) rel='in '+Math.floor(diff/60)+'h'+(diff%60?(' '+diff%60+'m'):'');
  else rel='in '+Math.floor(diff/1440)+'d';
  return day+', '+t+' · '+rel;
}

// combined gesture: horizontal drag = swipe-to-delete; quick tap on text = edit
function attachRow(row,sw,{tapEl,onTapText}){
  let x0=null,y0=null,dx=0,open=false,moved=false; const W=84, set=v=>row.style.transform='translateX('+v+'px)';
  row.addEventListener('pointerdown',e=>{ if(e.target.tagName==='INPUT'||e.target.classList.contains('cb')||e.target.classList.contains('del')) return;
    x0=e.clientX; y0=e.clientY; moved=false; row.style.transition='none'; });
  row.addEventListener('pointermove',e=>{ if(x0==null) return; const d=e.clientX-x0;
    if(Math.abs(d)>6||Math.abs(e.clientY-y0)>6) moved=true;
    dx=Math.min(0,Math.max(-W,d+(open?-W:0))); set(dx); });
  const end=e=>{ if(x0==null) return; row.style.transition='transform .18s ease';
    if(!moved){ set(open?-W:0); open=false; if(tapEl&&(e.target===tapEl||tapEl.contains(e.target))) onTapText&&onTapText(); }
    else { open=dx<-W/2; set(open?-W:0); } x0=null; };
  row.addEventListener('pointerup',end);
  row.addEventListener('pointercancel',()=>{ if(x0!=null){ row.style.transition='transform .18s ease'; set(open?-W:0); x0=null; } });
}

  setTimeout(()=>{ if(view===kind) renderList(kind); },180);
}
async function editItem(kind,id,text){ try{ await api('/api/item/edit',{method:'POST',body:JSON.stringify({kind,id,text})}); setDot(true); }catch(e){ setDot(false); } }

// ---------- settings ----------
function renderSettings(){
  main.innerHTML=`<h2>Connection</h2>
    <label>KRC Cloud URL</label><input class="f" id="sUrl" value="${escapeHtml(cfg.url)}"/>
    <label>Access Token (X-KRC-Token)</label><input class="f" id="sTok" type="password" value="${escapeHtml(cfg.token)}"/>
    <label style="display:flex;align-items:center;gap:9px;margin-top:18px;color:var(--txt)"><input type="checkbox" id="sSpeak" ${cfg.speak?'checked':''}/> KRC speaks out loud (replies &amp; app actions)</label>
    <label style="display:flex;align-items:center;gap:9px;margin-top:14px;color:var(--txt)"><input type="checkbox" id="sEleven" ${cfg.eleven?'checked':''}/> ElevenLabs voice — optional (premium; monthly limit)</label>
    <label>Voice (FREE, unlimited — default — pick a British male)</label><select class="f" id="sVoice"></select>
    <button class="btn ghost" id="voiceTest" style="margin-top:10px">🔊 Hear KRC's voice</button>
    <h2 style="margin-top:24px">Notifications</h2>
    <div style="display:flex;gap:8px">
      <button class="btn ghost" id="pushOn" style="margin:0;flex:1">🔔 Enable</button>
      <button class="btn ghost" id="pushTest" style="margin:0;flex:1">Send test</button>
    </div>
    <div class="status" id="pushStatus" style="margin-top:8px">KRC can ping your phone with briefs &amp; insights even when the app is closed. iPhone: install to Home Screen first (iOS 16.4+).</div>
    <h2 style="margin-top:24px">Install</h2>
    <button class="btn ghost" id="installBtn" style="margin:0">📲 Install KRC as an app</button>
    <div class="status" id="installStatus" style="margin-top:8px"></div>
    <button class="btn" id="saveBtn">Save</button>
    <div class="status" id="sStatus"></div>
    <div class="status" style="margin-top:20px;color:#33586a">KRC companion · free & synced with your robot + desktop. Token stored only on this device.</div>`;
  (function fill(){ loadVoices(); const sel=$('#sVoice'); if(!sel) return;
    if(!_voices.length){ sel.innerHTML='<option value="">(loading voices…)</option>'; setTimeout(fill,400); return; }
    const cur=localStorage.krcVoice||''; sel.innerHTML='<option value="">Auto — best British male</option>'+
      _voices.map(v=>`<option value="${escapeHtml(v.name)}" ${v.name===cur?'selected':''}>${escapeHtml(v.name)} — ${v.lang}</option>`).join('');
  })();
  $('#voiceTest').onclick=()=>{ localStorage.krcVoice=$('#sVoice').value; cfg.eleven=$('#sEleven').checked; speak("Good evening. I am KRC, your companion. All systems are online."); };
  $('#pushOn').onclick=enablePush; $('#pushTest').onclick=testPush;
  const ib=$('#installBtn');
  if(ib){ $('#installStatus').textContent=installHint();
    ib.onclick=async()=>{ if(await installApp()) $('#installStatus').textContent='Installing…';
                          else $('#installStatus').textContent=installHint(); }; }
  $('#saveBtn').onclick=()=>{ cfg.url=$('#sUrl').value.trim(); cfg.token=$('#sTok').value.trim(); cfg.speak=$('#sSpeak').checked; cfg.eleven=$('#sEleven').checked; localStorage.krcVoice=$('#sVoice').value; $('#sStatus').textContent='Saved ✓ · syncing to all devices…'; syncSettingsUp().then(()=>{ $('#sStatus').textContent='Saved ✓ · synced to all your devices'; }); };
}

// ---------- wire ----------
document.querySelectorAll('#nav button').forEach(b=> b.onclick=()=>show(b.dataset.v));
$('#sendBtn').onclick=send; $('#micBtn').onclick=startVoice;
$('#chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
show(cfg.token?'home':'settings');
if(cfg.token){ api('/api/health').then(()=>setDot(true)).catch(()=>setDot(false)); syncSettingsDown(); }
if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
